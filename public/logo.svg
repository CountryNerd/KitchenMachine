<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="thermometerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1e293b" stroke="url(#flameGradient)" stroke-width="3"/>
  
  <!-- Flame shapes -->
  <path d="M 30 65 Q 25 55 30 45 Q 28 50 30 55 Q 32 50 35 45 Q 33 55 35 65 Z" 
        fill="url(#flameGradient)" opacity="0.8"/>
  <path d="M 45 70 Q 40 58 45 45 Q 43 52 45 58 Q 47 52 50 45 Q 48 58 50 70 Z" 
        fill="url(#flameGradient)" opacity="0.9"/>
  <path d="M 60 65 Q 55 55 60 45 Q 58 50 60 55 Q 62 50 65 45 Q 63 55 65 65 Z" 
        fill="url(#flameGradient)" opacity="0.8"/>
  
  <!-- Thermometer -->
  <rect x="42" y="20" width="16" height="45" rx="8" fill="url(#thermometerGradient)" opacity="0.9"/>
  <circle cx="50" cy="68" r="10" fill="#f97316"/>
  <rect x="46" y="25" width="8" height="38" rx="4" fill="#0f172a" opacity="0.3"/>
  
  <!-- Temperature marks -->
  <line x1="46" y1="30" x2="50" y2="30" stroke="#fbbf24" stroke-width="2"/>
  <line x1="46" y1="40" x2="50" y2="40" stroke="#fbbf24" stroke-width="2"/>
  <line x1="46" y1="50" x2="50" y2="50" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Mercury column -->
  <rect x="47" y="45" width="6" height="18" rx="3" fill="#f97316"/>
</svg>
